<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokedex</title>
    <link rel="stylesheet" href="./style/standart.css">
    <link rel="stylesheet" href="./style/template.css">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="./img/pokeball_favicon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="./script.js"></script>
</head>

<body id="body" onload="init()">
    <div class="site">
        <header>
            <div class="container-header-footer">
                <h1 class="header-title">Pokedex</h1>
                <input id="search_input" class="search-pokemon-input" type="text"  oninput="searchPokemon()"
                    placeholder="Search by name or ID">
            </div>
        </header>
        <main>
            <div class="content-limit">
                <div id="loading-spinner" class="loading-spinner df-c-c-c d-none">
                    <img class="loading-icon" src="./img/pokeball-icon.png" alt="">
                    <span class="loading-text">loading ...</span>
                </div>
                <section id="container_card_pokemon" class="container-card-pokemon df-c-c">
                    <!-- JS Render Pokemon Card -->
                </section>
                <div class="container-button-load-more">
                    <button id="load_more" onclick="loadMorePokemon()" class="button-load-more">load more</button>
                </div>

                <dialog id="dialog" class="dialog-pokemon-card" onclick="closePokemonCard()">
                    <div onclick="event.stopPropagation()" class="container-pokemon-card-dialog df-c-c-c">
                        <div>
                            <img id="dialog-image" src="" alt="">
                            <button onclick="closePokemonCard()">X</button>
                        </div>
                        <div class="pokemon-stats df-c-st-c">
                            <span>HP</span>
                            <div class="progress df-c-st-c" role="progressbar" aria-label="Example 1px high"
                                aria-valuenow="25" aria-valuemin="0" aria-valuemax="100" style="width: 200px">
                                <div id="stat_hp" class="progress-bar" style="width: 100%"></div>
                            </div>
                            <span>Attack</span>
                            <div class="progress df-c-st-c" role="progressbar" aria-label="Example 1px high"
                                aria-valuenow="25" aria-valuemin="0" aria-valuemax="100" style="width: 200px">
                                <div id="stat_attack" class="progress-bar" style="width: 100%"></div>
                            </div>
                            <span>Defense</span>
                            <div class="progress df-c-st-c" role="progressbar" aria-label="Example 1px high"
                                aria-valuenow="25" aria-valuemin="0" aria-valuemax="100" style="width: 200px">
                                <div id="stat_defense" class="progress-bar" style="width: 100%"></div>
                            </div>
                            <span>Special-Attack</span>
                            <div class="progress df-c-st-c" role="progressbar" aria-label="Example 1px high"
                                aria-valuenow="25" aria-valuemin="0" aria-valuemax="100" style="width: 200px">
                                <div id="stat_special_attack" class="progress-bar" style="width: 100%"></div>
                            </div>
                            <span>Special-Defense</span>
                            <div class="progress df-c-st-c" role="progressbar" aria-label="Example 1px high"
                                aria-valuenow="25" aria-valuemin="0" aria-valuemax="100" style="width: 200px">
                                <div id="stat_special_defense" class="progress-bar" style="width: 100%"></div>
                            </div>
                            <span>Speed</span>
                            <div class="progress df-c-st-c" role="progressbar" aria-label="Example 1px high"
                                aria-valuenow="25" aria-valuemin="0" aria-valuemax="100" style="width: 200px">
                                <div id="stat_speed" class="progress-bar" style="width: 100%"></div>
                            </div>
                        </div>
                        <div>
                            <button id="dialog_prev_button" onclick="prevPokemon()">preview</button>
                            <button id="dialog_next_button" onclick="nextPokemon()">next</button>
                        </div>

                    </div>
                </dialog>
            </div>
        </main>
        <div>
            <footer class="df-c-c">
                <span>&copy; 2023 Pokedex. All rights reserved.</span>
            </footer>
        </div>

    </div>
</body>

</html>
